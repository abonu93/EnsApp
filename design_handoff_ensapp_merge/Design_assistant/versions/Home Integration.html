<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Eligo — Home integration options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Hanken+Grotesk:wght@700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #eceef2; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#4F8FBC"/><g fill="none" stroke="#fff" stroke-width="2.6"><path d="M50 35 A11 11 0 0 1 50 57 A11 11 0 0 1 50 35 Z" fill="#fff"/><circle cx="44" cy="46" r="11"/><circle cx="56" cy="46" r="11"/></g></svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ens-real.jsx"></script>
<script type="text/babel" src="ens-home-abc.jsx"></script>
<script type="text/babel" src="ens-home-de.jsx"></script>

<script type="text/babel">
const OPTS = [
  { id: 'a', title: 'A · Ask hero, manual below', subtitle: 'Ask = solid glacier hero with field + chips · New patient as secondary card', Comp: window.HomeA },
  { id: 'b', title: 'B · Search bar + chips', subtitle: 'Ask = light search bar with logo + chips · New patient keeps the solid hero', Comp: window.HomeB },
  { id: 'c', title: 'C · Equal duo', subtitle: 'Ask = tinted card with chips · New patient = solid hero, balanced pair', Comp: window.HomeC },
  { id: 'd', title: 'D · Ask hero + suggestion list', subtitle: 'Greeting · ask hero with field + tappable prompts · compact New patient row', Comp: window.HomeD },
  { id: 'e', title: 'E · Gradient band (V5 spirit)', subtitle: 'Glacier gradient header with embedded ask + chips · New patient hero below', Comp: window.HomeE },
];

function App() {
  return (
    <DesignCanvas>
      <DCSection id="homes" title="Home — Ask + manual New patient" subtitle="Same Eligo style, colours and logo · 5 ways to integrate the chat entry above the manual flow">
        {OPTS.map((o) => (
          <DCArtboard key={o.id} id={o.id} label={o.title} width={360} height={780}><o.Comp /></DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
