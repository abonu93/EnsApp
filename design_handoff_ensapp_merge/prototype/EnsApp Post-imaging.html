  s.id = 'ens-range-css';
  s.textContent = `
    input.ens-range{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:999px;background:${ENS.lineSoft};outline:none;margin:0}
    input.ens-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;border-radius:999px;background:#fff;border:2px solid ${ENS.primary};box-shadow:0 1px 4px rgba(16,24,40,.18);cursor:pointer}
    input.ens-range::-moz-range-thumb{width:26px;height:26px;border-radius:999px;background:#fff;border:2px solid ${ENS.primary};box-shadow:0 1px 4px rgba(16,24,40,.18);cursor:pointer}
    .ens-input::placeholder{color:${ENS.ink3}}
    .ens-input:focus{border-color:${ENS.primary};box-shadow:0 0 0 3px ${ENS.primaryBg}}
  `;
  document.head.appendChild(s);
}

function AppHeader({ title, sub, step, steps, onBack, onClose }) {
  return (
    <div style={{ paddingTop: 54, paddingLeft: 16, paddingRight: 16, paddingBottom: 12, background: ENS.bg }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: title ? 12 : 0 }}>
        <button className="ens-press" onClick={onBack} style={{ width: 38, height: 38, borderRadius: 999, border: 'none', background: ENS.surface, boxShadow: softShadow, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0 }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke={ENS.ink} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
        </button>
        <div style={{ flex: 1 }} />
        {step != null && (
          <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
            {Array.from({ length: steps }).map((_, i) => (
              <span key={i} style={{ width: i === step ? 18 : 6, height: 6, borderRadius: 999, background: i <= step ? ENS.primary : ENS.line, transition: 'width .3s, background .3s' }} />
            ))}
          </div>
        )}
        {onClose && (
          <button className="ens-press" onClick={onClose} style={{ width: 38, height: 38, borderRadius: 999, border: 'none', background: ENS.surface, boxShadow: softShadow, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke={ENS.ink2} strokeWidth="2" strokeLinecap="round" /></svg>
          </button>
        )}
      </div>
      {title && <div style={{ paddingLeft: 4 }}>
        <div style={{ fontSize: 25, fontWeight: 600, letterSpacing: -0.6 }}>{title}</div>
        {sub && <div style={{ fontSize: 13.5, color: ENS.ink3, marginTop: 4 }}>{sub}</div>}
      </div>}
    </div>
  );
}

function BottomBar({ onBack, onNext, nextLabel, nextDisabled, backLabel }) {
  const { t } = useT();
  return (
    <div style={{ flexShrink: 0, display: 'flex', gap: 10, padding: '12px 16px 28px', background: ENS.bg, borderTop: `1px solid ${ENS.lineSoft}` }}>
      {onBack && (
        <button className="ens-press" onClick={onBack} style={{ flex: '0 0 auto', minWidth: 96, border: 'none', background: ENS.surface, boxShadow: softShadow, borderRadius: 14, padding: '15px 18px', cursor: 'pointer', fontFamily: ENS.sans, fontSize: 15, fontWeight: 600, color: ENS.ink2 }}>{backLabel || t('back')}</button>
      )}
      <button className="ens-press" onClick={nextDisabled ? undefined : onNext} style={{ flex: 1, border: 'none', borderRadius: 14, padding: '15px 18px', cursor: nextDisabled ? 'default' : 'pointer', fontFamily: ENS.sans, fontSize: 15, fontWeight: 600, color: '#fff', background: nextDisabled ? '#AEBBD6' : ENS.primary, boxShadow: nextDisabled ? 'none' : '0 6px 16px rgba(45,91,215,.28)', transition: 'background .2s' }}>{nextLabel || t('next')}</button>
    </div>
  );
}

function Card({ children, style }) {
  return <div style={{ background: ENS.surface, borderRadius: 18, boxShadow: softShadow, padding: 16, ...style }}>{children}</div>;
}

function Field({ label, hint, children }) {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8 }}>
        <span style={{ fontSize: 13.5, fontWeight: 600, color: ENS.ink2 }}>{label}</span>
        {hint && <span style={{ fontSize: 11.5, color: ENS.ink3, fontFamily: ENS.mono }}>{hint}</span>}
      </div>
      {children}
    </div>
  );
}

function TextField({ value, onChange, placeholder, mono, unit }) {
  return (
    <div style={{ position: 'relative', display: 'flex', alignItems: 'center' }}>
      <input className="ens-input" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        style={{ width: '100%', boxSizing: 'border-box', border: `1px solid ${ENS.line}`, borderRadius: 12, padding: '13px 14px', fontSize: 16, fontFamily: mono ? ENS.mono : ENS.sans, color: ENS.ink, background: ENS.surface, outline: 'none', transition: 'border-color .15s, box-shadow .15s' }} />
      {unit && <span style={{ position: 'absolute', right: 14, fontSize: 13, color: ENS.ink3, fontFamily: ENS.mono, pointerEvents: 'none' }}>{unit}</span>}
    </div>
  );
}

// NIHSS — large scale selector (slider + value + severity band)
function NihssScale({ value, onChange }) {
  const v = value == null ? 0 : value;
  const bands = [[0, 0, 'No deficit', ENS.okFg], [1, 4, 'Minor', ENS.okFg], [5, 15, 'Moderate', ENS.warnFg], [16, 20, 'Mod–severe', ENS.warnFg], [21, 42, 'Severe', ENS.dangFg]];
  const band = bands.find(([lo, hi]) => v >= lo && v <= hi) || bands[0];
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 12 }}>
        <span style={{ fontFamily: ENS.mono, fontSize: 38, fontWeight: 600, letterSpacing: -1, color: ENS.ink, lineHeight: 0.9 }}>{value == null ? '—' : v}</span>
        <span style={{ fontSize: 12, fontWeight: 600, color: band[3], background: band[3] + '1A', padding: '4px 10px', borderRadius: 999 }}>{band[2]}</span>
      </div>
      <input className="ens-range" type="range" min="0" max="42" value={v} onChange={(e) => onChange(Number(e.target.value))} />
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6, fontFamily: ENS.mono, fontSize: 10.5, color: ENS.ink3 }}>
        <span>0</span><span>21</span><span>42</span>
      </div>
    </div>
  );
}

function Segmented({ options, value, onChange, cols }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols || options.length}, 1fr)`, gap: 7 }}>
      {options.map((o) => {
        const val = typeof o === 'object' ? o.v : o;
        const lab = typeof o === 'object' ? o.l : o;
        const on = value === val;
        return (
          <button key={val} className="ens-press" onClick={() => onChange(val)} style={{ border: on ? `1.5px solid ${ENS.primary}` : `1px solid ${ENS.line}`, background: on ? ENS.primaryBg : ENS.surface, color: on ? ENS.primaryDk : ENS.ink2, borderRadius: 11, padding: '12px 4px', cursor: 'pointer', fontFamily: ENS.sans, fontSize: 14, fontWeight: 600, transition: 'all .15s' }}>{lab}</button>
        );
      })}
    </div>
  );
}

// time since LTSW → auto window classification
function computeWindow(totalMin) {
  if (totalMin == null) return null;
  if (totalMin <= 270) return { key: 'tpaWin', tone: 'ok' };       // 4.5h IV thrombolysis
  if (totalMin <= 360) return { key: 'evtWin', tone: 'ok' };       // 6h standard EVT
  if (totalMin <= 1440) return { key: 'evtWin', tone: 'warn' };    // up to 24h selected EVT
  return { key: 'windowClosed', tone: 'danger' };
}

function TimeSinceField({ hours, mins, onChange }) {
  const { t } = useT();
  const total = hours == null && mins == null ? null : (hours || 0) * 60 + (mins || 0);
  const win = computeWindow(total);
  const toneMap = { ok: [ENS.okFg, ENS.okBg], warn: [ENS.warnFg, ENS.warnBg], danger: [ENS.dangFg, ENS.dangBg] };
  const Step = ({ val, unit, set }) => (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between', border: `1px solid ${ENS.line}`, borderRadius: 12, padding: '6px 8px', background: ENS.surface }}>
      <button className="ens-press" onClick={() => set(Math.max(0, (val || 0) - 1))} style={{ width: 34, height: 34, borderRadius: 9, border: 'none', background: ENS.bgSunken, cursor: 'pointer', fontSize: 20, color: ENS.ink2, lineHeight: 1 }}>−</button>
      <span style={{ display: 'flex', alignItems: 'baseline', gap: 3 }}>
        <span style={{ fontFamily: ENS.mono, fontSize: 19, fontWeight: 600, color: ENS.ink }}>{val == null ? '0' : val}</span>
        <span style={{ fontSize: 11, color: ENS.ink3 }}>{unit}</span>
      </span>
      <button className="ens-press" onClick={() => set((val || 0) + 1)} style={{ width: 34, height: 34, borderRadius: 9, border: 'none', background: ENS.bgSunken, cursor: 'pointer', fontSize: 20, color: ENS.ink2, lineHeight: 1 }}>+</button>
    </div>
  );
  return (
    <div>
      <div style={{ display: 'flex', gap: 9 }}>
        <Step val={hours} unit={t('hr')} set={(x) => onChange(x, mins)} />
        <Step val={mins} unit={t('min')} set={(x) => onChange(hours, x)} />
      </div>
      {win && (
        <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', borderRadius: 10, background: toneMap[win.tone][1] }}>
          {I.clock(toneMap[win.tone][0], 14)}
          <span style={{ fontSize: 12.5, fontWeight: 600, color: toneMap[win.tone][0] }}>
            {win.key === 'windowClosed' ? t('windowClosed') : `${t('within')} ${t(win.key)} ${t('window')}`}
          </span>
        </div>
      )}
    </div>
  );
}

// bottom sheet
function Sheet({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: 'absolute', inset: 0, zIndex: 40, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(14,23,38,.32)', animation: 'ens-fade .2s ease' }} />
      <div onClick={(e) => e.stopPropagation()} style={{ position: 'relative', background: ENS.surface, borderTopLeftRadius: 24, borderTopRightRadius: 24, padding: '10px 16px 30px', animation: 'ens-sheet-up .32s cubic-bezier(.2,.8,.2,1)', maxHeight: '76%', overflow: 'auto' }}>
        <div style={{ width: 38, height: 5, borderRadius: 999, background: ENS.line, margin: '0 auto 14px' }} />
        {title && <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 12, paddingLeft: 4 }}>{title}</div>}
        {children}
      </div>
    </div>
  );
}

Object.assign(window, { AppHeader, BottomBar, Card, Field, TextField, NihssScale, Segmented, computeWindow, TimeSinceField, Sheet });

</script>
<script type="text/babel">
/* === ensapp-postimg.jsx === */
// ensapp-postimg.jsx — three UX directions for the Post-imaging step
// Focus: make target-vessel selection easier & cooler + restyle params.
// Exposes: PostA, PostB, PostC
const { useState: useStateP } = React;

const VLAB = { ica: 'ICA', icaT: 'ICA-T', m1: 'M1', m2pd: 'M2 prox', m2any: 'M2 any', m2gt: '>M2', a1: 'A1', a2: 'A2', a2gt: '>A2', basilar: 'Basilar', p1: 'P1', p2: 'P2', p2gt: '>P2', va: 'VA' };
const GRP = {
  ica: ['ica', 'icaT'], mca: ['m1', 'm2pd', 'm2any', 'm2gt'], aca: ['a1', 'a2', 'a2gt'],
  post: ['va', 'basilar', 'p1', 'p2', 'p2gt'],
};
const COMMON = ['m1', 'icaT', 'basilar', 'm2pd'];
const ALL = Object.keys(VLAB);

// iOS-style switch
function Switch({ on, onChange }) {
  return (
    <button className="ens-press" onClick={() => onChange(!on)} style={{ width: 46, height: 28, borderRadius: 999, border: 'none', cursor: 'pointer', background: on ? ENS.primary : ENS.line, position: 'relative', transition: 'background .2s', flexShrink: 0 }}>
      <span style={{ position: 'absolute', top: 3, left: on ? 21 : 3, width: 22, height: 22, borderRadius: 999, background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,.25)', transition: 'left .2s' }} />
    </button>

}
function ToggleRow({ title, sub, on, onChange }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <span style={{ flex: 1 }}>
        <span style={{ display: 'block', fontSize: 14, fontWeight: 600, color: ENS.ink }}>{title}</span>
        {sub && <span style={{ display: 'block', fontSize: 11.5, color: ENS.ink3, marginTop: 1 }}>{sub}</span>}
      </span>
      <Switch on={on} onChange={onChange} />

}

// vessel chip (pill or block)
function VChip({ k, sel, onTap, block }) {
  const on = sel.includes(k);
  return (
    <button className="ens-press" onClick={() => onTap(k)} style={{ cursor: 'pointer', border: on ? `1.5px solid ${ENS.primary}` : `1px solid ${ENS.line}`, background: on ? ENS.primary : ENS.surface, color: on ? '#fff' : ENS.ink, borderRadius: block ? 12 : 999, padding: block ? '13px 12px' : '8px 13px', fontSize: block ? 14 : 13, fontWeight: 600, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6, transition: 'all .15s', width: block ? '100%' : 'auto' }}>
      {on && <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4 10-10" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" /></svg>}
      {VLAB[k]}
    </button>

}

// selected summary chips (removable)
function SelBar({ sel, onTap }) {
  if (!sel.length) return <div style={{ fontSize: 12.5, color: ENS.ink3, fontStyle: 'italic' }}>No vessel selected yet</div>;
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
      {sel.map((k) => (
        <span key={k} className="ens-press" onClick={() => onTap(k)} style={{ cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 5, background: ENS.primaryBg, color: ENS.primaryDk, border: `1px solid ${ENS.primary}33`, borderRadius: 999, padding: '5px 7px 5px 11px', fontSize: 12.5, fontWeight: 600 }}>
          {VLAB[k]}<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke={ENS.primaryDk} strokeWidth="2.4" strokeLinecap="round" /></svg>
        </span>
      ))}
    </div>
  );
}

// ASPECTS as colored 0-10 cells
function AspectsCells({ value, onChange }) {
  const tone = (v) => v <= 5 ? ENS.dangFg : v <= 7 ? ENS.warnFg : ENS.okFg;
  const lab = value == null ? '' : value <= 5 ? 'Large core' : value <= 7 ? 'Moderate' : 'Favorable';
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 10 }}>
        <span style={{ fontFamily: ENS.mono, fontSize: 30, fontWeight: 600, letterSpacing: -1, color: value == null ? ENS.ink3 : tone(value) }}>{value == null ? '—' : value}<span style={{ fontSize: 14, color: ENS.ink3 }}>/10</span></span>
        {lab && <span style={{ fontSize: 12, fontWeight: 600, color: tone(value), background: tone(value) + '1A', padding: '4px 10px', borderRadius: 999 }}>{lab}</span>}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(11,1fr)', gap: 4 }}>
        {Array.from({ length: 11 }).map((_, i) => {
          const on = value != null && i <= value;
          return <button key={i} className="ens-press" onClick={() => onChange(i)} style={{ height: 34, borderRadius: 8, border: 'none', cursor: 'pointer', background: on ? tone(value) : ENS.bgSunken, color: on ? '#fff' : ENS.ink3, fontFamily: ENS.mono, fontSize: 12, fontWeight: 600, transition: 'background .12s' }}>{i}</button>;
        })}
      </div>
    </div>
  );
}
// ASPECTS as big stepper
function AspectsStepper({ value, onChange }) {
  const v = value == null ? 8 : value;
  const tone = v <= 5 ? ENS.dangFg : v <= 7 ? ENS.warnFg : ENS.okFg;
  const lab = v <= 5 ? 'Large core' : v <= 7 ? 'Moderate' : 'Favorable';
  const btn = (txt, fn) => <button className="ens-press" onClick={fn} style={{ width: 52, height: 52, borderRadius: 14, border: `1px solid ${ENS.line}`, background: ENS.surface, cursor: 'pointer', fontSize: 26, color: ENS.ink2, lineHeight: 1 }}>{txt}</button>;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
      {btn('−', () => onChange(Math.max(0, v - 1)))}
      <div style={{ flex: 1, textAlign: 'center' }}>
        <div style={{ fontFamily: ENS.mono, fontSize: 36, fontWeight: 600, letterSpacing: -1, color: tone, lineHeight: 1 }}>{value == null ? '—' : v}</div>
        <div style={{ fontSize: 11.5, fontWeight: 600, color: tone, marginTop: 3 }}>{lab}</div>
      </div>
      {btn('+', () => onChange(Math.min(10, v + 1)))}
    </div>

// compact stroke-type + candidacy header shared by all variants
function TopContext({ st, setSt, evt, setEvt }) {
  const { t } = useT();
  const seg = (opts, val, set, color) => (
    <div style={{ display: 'flex', gap: 7 }}>
      {opts.map((o) => {
        const on = val === o.v; const c = color && o.v === 'yes' ? ENS.okFg : ENS.primary;

      })}

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>

function Shell({ children, onBack }) {

  return (

      <div style={{ flex: 1, overflow: 'auto', padding: '6px 16px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>{children}</div>
      <BottomBar onBack={onBack} onNext={() => {}} nextLabel={t('review')} />

}

const SecHead = ({ children, note }) => (
  <div style={{ marginBottom: 12 }}>
    <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: -0.2 }}>{children}</div>
    {note && <div style={{ fontSize: 11.5, color: ENS.ink3, marginTop: 3, lineHeight: 1.4 }}>{note}</div>}
  </div>
);

// ═══ A · Anatomical tree ═══════════════════════════════════════
function PostA({ onBack }) {
  const [st, setSt] = useStateP('isch');
  const [evt, setEvt] = useStateP('yes');
  const [sel, setSel] = useStateP(['m1']);
  const [feat, setFeat] = useStateP({ tandem: false, tort: false });
  const [asp, setAsp] = useStateP(8);
  const tap = (k) => setSel((s) => s.includes(k) ? s.filter((x) => x !== k) : [...s, k]);

  const Branch = ({ label, items }) => (
    <div style={{ borderLeft: `2px solid ${ENS.lineSoft}`, paddingLeft: 14, marginLeft: 8, position: 'relative' }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: ENS.ink3, letterSpacing: 0.4, marginBottom: 8, textTransform: 'uppercase' }}>{label}</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>{items.map((k) => <VChip key={k} k={k} sel={sel} onTap={tap} />)}</div>
    </div>
  );

  return (
    <Shell onBack={onBack}>
      <Card><TopContext st={st} setSt={setSt} evt={evt} setEvt={setEvt} /></Card>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <SecHead note="Tap occluded segments on the arterial tree.">Target vessel · {sel.length}</SecHead>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <span style={{ width: 9, height: 9, borderRadius: 999, background: ENS.isch }} />
              <span style={{ fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap' }}>Anterior circulation</span>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7, marginBottom: 12 }}>{GRP.ica.map((k) => <VChip key={k} k={k} sel={sel} onTap={tap} />)}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <Branch label="MCA" items={GRP.mca} />
              <Branch label="ACA" items={GRP.aca} />
            </div>
          </div>
          <div style={{ borderTop: `1px solid ${ENS.lineSoft}`, paddingTop: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <span style={{ width: 9, height: 9, borderRadius: 999, background: ENS.post }} />
              <span style={{ fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap' }}>Posterior circulation</span>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>{GRP.post.map((k) => <VChip key={k} k={k} sel={sel} onTap={tap} />)}</div>
          </div>
        </div>
      </Card>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <SecHead>Vessel features</SecHead>
        <ToggleRow title="Tandem occlusion" on={feat.tandem} onChange={(v) => setFeat((f) => ({ ...f, tandem: v }))} />
        <div style={{ borderTop: `1px solid ${ENS.lineSoft}` }} />
        <ToggleRow title="Vessel tortuosity" on={feat.tort} onChange={(v) => setFeat((f) => ({ ...f, tort: v }))} />
      </Card>
      <Card><SecHead>ASPECTS</SecHead><AspectsCells value={asp} onChange={setAsp} /></Card>
    </Shell>
  );
}

// ═══ B · Region drill-down ═════════════════════════════════════
function PostB({ onBack }) {
  const [st, setSt] = useStateP('isch');
  const [evt, setEvt] = useStateP('yes');
  const [sel, setSel] = useStateP(['icaT']);
  const [region, setRegion] = useStateP('ica');
  const [feat, setFeat] = useStateP({ tandem: false, tort: false });
  const [asp, setAsp] = useStateP(7);
  const tap = (k) => setSel((s) => s.includes(k) ? s.filter((x) => x !== k) : [...s, k]);
  const regions = [{ k: 'ica', l: 'ICA' }, { k: 'mca', l: 'MCA' }, { k: 'aca', l: 'ACA' }, { k: 'post', l: 'Posterior' }];

  return (
    <Shell onBack={onBack}>
      <Card><TopContext st={st} setSt={setSt} evt={evt} setEvt={setEvt} /></Card>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <SecHead note="Pick a region, then the occluded segment.">Target vessel</SecHead>
        <SelBar sel={sel} onTap={tap} />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 6, background: ENS.bgSunken, borderRadius: 12, padding: 4 }}>
          {regions.map((r) => {
            const on = region === r.k; const count = GRP[r.k].filter((v) => sel.includes(v)).length;
            return (
              <button key={r.k} className="ens-press" onClick={() => setRegion(r.k)} style={{ cursor: 'pointer', border: 'none', borderRadius: 9, padding: '10px 4px', background: on ? ENS.surface : 'transparent', boxShadow: on ? '0 1px 3px rgba(16,24,40,.12)' : 'none', color: on ? ENS.ink : ENS.ink3, fontSize: 13, fontWeight: 600, position: 'relative' }}>
                {r.l}
                {count > 0 && <span style={{ position: 'absolute', top: 3, right: 5, width: 15, height: 15, borderRadius: 999, background: ENS.primary, color: '#fff', fontSize: 9.5, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{count}</span>}
              </button>
            );
          })}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {GRP[region].map((k) => <VChip key={k} k={k} sel={sel} onTap={tap} block />)}
        </div>
      </Card>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <SecHead>Vessel features</SecHead>
        <ToggleRow title="Tandem occlusion" on={feat.tandem} onChange={(v) => setFeat((f) => ({ ...f, tandem: v }))} />
        <div style={{ borderTop: `1px solid ${ENS.lineSoft}` }} />
        <ToggleRow title="Vessel tortuosity" on={feat.tort} onChange={(v) => setFeat((f) => ({ ...f, tort: v }))} />
      </Card>
      <Card><SecHead>ASPECTS</SecHead><AspectsCells value={asp} onChange={setAsp} /></Card>
    </Shell>
  );
}

// ═══ C · Quick-pick (frequency) ════════════════════════════════
function PostC({ onBack }) {
  const [st, setSt] = useStateP('isch');
  const [evt, setEvt] = useStateP('yes');
  const [sel, setSel] = useStateP(['m1']);
  const [side, setSide] = useStateP('left');
  const [expand, setExpand] = useStateP(false);
  const [feat, setFeat] = useStateP({ tandem: false, tort: false });
  const [asp, setAsp] = useStateP(8);
  const tap = (k) => setSel((s) => s.includes(k) ? s.filter((x) => x !== k) : [...s, k]);
  const rest = ALL.filter((k) => !COMMON.includes(k));

  return (
    <Shell onBack={onBack}>
      <Card><TopContext st={st} setSt={setSt} evt={evt} setEvt={setEvt} /></Card>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <SecHead note="Most cases — one tap. Open all vessels for the rest.">Target vessel</SecHead>
        {/* side */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 13, color: ENS.ink2, fontWeight: 600 }}>Side</span>
          <div style={{ flex: 1, display: 'flex', gap: 6, background: ENS.bgSunken, borderRadius: 10, padding: 3 }}>
            {[{ k: 'left', l: 'Left' }, { k: 'right', l: 'Right' }, { k: 'na', l: '—' }].map((o) => {
              const on = side === o.k;
              return <button key={o.k} className="ens-press" onClick={() => setSide(o.k)} style={{ flex: 1, cursor: 'pointer', border: 'none', borderRadius: 8, padding: '8px 4px', background: on ? ENS.surface : 'transparent', boxShadow: on ? '0 1px 3px rgba(16,24,40,.12)' : 'none', color: on ? ENS.ink : ENS.ink3, fontSize: 13, fontWeight: 600 }}>{o.l}</button>;
            })}
          </div>
        </div>
        {/* common big chips */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {COMMON.map((k) => <VChip key={k} k={k} sel={sel} onTap={tap} block />)}
        </div>
        {/* expander */}
        <button className="ens-press" onClick={() => setExpand((e) => !e)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '6px 0', color: ENS.primary, fontFamily: ENS.sans, fontSize: 13.5, fontWeight: 600 }}>
          {expand ? 'Hide' : 'All vessels'}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{ transform: expand ? 'rotate(180deg)' : 'none', transition: 'transform .2s' }}><path d="M7 10l5 5 5-5" stroke={ENS.primary} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
        </button>
        {expand && <div className="ens-screen-in" style={{ display: 'flex', flexWrap: 'wrap', gap: 7 }}>{rest.map((k) => <VChip key={k} k={k} sel={sel} onTap={tap} />)}</div>}
        {sel.length > 0 && <div style={{ borderTop: `1px solid ${ENS.lineSoft}`, paddingTop: 12 }}><SelBar sel={sel} onTap={tap} /></div>}
      </Card>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <SecHead>Vessel features</SecHead>
        <ToggleRow title="Tandem occlusion" on={feat.tandem} onChange={(v) => setFeat((f) => ({ ...f, tandem: v }))} />
        <div style={{ borderTop: `1px solid ${ENS.lineSoft}` }} />
        <ToggleRow title="Vessel tortuosity" on={feat.tort} onChange={(v) => setFeat((f) => ({ ...f, tort: v }))} />
      </Card>
      <Card><SecHead>ASPECTS</SecHead><AspectsStepper value={asp} onChange={setAsp} /></Card>
    </Shell>
  );
}

Object.assign(window, { PostA, PostB, PostC });

</script>
