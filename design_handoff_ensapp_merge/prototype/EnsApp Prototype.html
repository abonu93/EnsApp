<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EnsApp — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; min-height: 100%; background: #eceef2; }
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  .ens-press { transition: transform .09s ease, filter .12s ease; -webkit-tap-highlight-color: transparent; }
  .ens-press:hover { filter: brightness(0.985); }
  .ens-press:active { transform: scale(0.97); filter: brightness(0.95); }

  /* shared entrance helpers */
  @keyframes ens-fade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes ens-sheet-up { from { transform: translateY(100%) } to { transform: translateY(0) } }
  @keyframes ens-rise { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
  .ens-rise { animation: ens-rise .55s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes ens-pop { 0% { transform: scale(.4); opacity: 0 } 60% { transform: scale(1.1) } 100% { transform: scale(1); opacity: 1 } }
  .ens-pop { animation: ens-pop .55s cubic-bezier(.2,.9,.3,1.5) both; }
  @keyframes ens-screen-in { from { opacity: 0; transform: translateX(26px) } to { opacity: 1; transform: translateX(0) } }
  .ens-screen-in { animation: ens-screen-in .34s cubic-bezier(.2,.8,.2,1) both; }

  /* transition variants for the New-patient → choice overlay */
  .ens-tr-sheet  { animation: ens-sheet-up .46s cubic-bezier(.2,.85,.25,1) both; }

  @keyframes ens-reveal { from { clip-path: circle(0% at var(--ox,50%) var(--oy,60%)) } to { clip-path: circle(150% at var(--ox,50%) var(--oy,60%)) } }
  .ens-tr-reveal { animation: ens-reveal .6s cubic-bezier(.3,.7,.3,1) both; }

  @keyframes ens-split { from { clip-path: inset(49.5% 0 49.5% 0) } to { clip-path: inset(0 0 0 0) } }
  .ens-tr-split { animation: ens-split .52s cubic-bezier(.2,.85,.25,1) both; }

  @keyframes ens-zoom { from { transform: scale(.18); opacity: 0; border-radius: 24px } 40% { opacity: 1 } to { transform: scale(1); opacity: 1; border-radius: 0 } }
  .ens-tr-zoom { transform-origin: var(--ox,50%) var(--oy,50%); animation: ens-zoom .52s cubic-bezier(.2,.8,.25,1) both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">

/* ===== ios-frame.jsx ===== */

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

// status chip
function Chip({ kind, children }) {
  const map = { active: [ENS.okFg, ENS.okBg], paused: [ENS.warnFg, ENS.warnBg], draft: [ENS.ink2, ENS.bgSunken], eligible: [ENS.okFg, ENS.okBg], screening: [ENS.primary, ENS.primaryBg] };
  const [fg, bg] = map[kind] || map.draft;
  return <span style={{ fontSize: 10.5, fontWeight: 600, color: fg, background: bg, padding: '2px 7px', borderRadius: 999, letterSpacing: 0.1, lineHeight: 1.5, whiteSpace: 'nowrap' }}>{children}</span>;
}

// live "time since" — measured-urgency element
function useElapsed(startMinAgo) {
  const [sec, setSec] = React.useState(startMinAgo * 60);
  React.useEffect(() => { const id = setInterval(() => setSec((s) => s + 1), 1000); return () => clearInterval(id); }, []);
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return { sec, label: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}` };
}

// window progress bar — calm blue, ambers near the end (measured)
function WindowBar({ frac }) {
  const near = frac > 0.72;
  const c = near ? ENS.warnFg : ENS.primary;
  const bg = near ? ENS.warnBg : ENS.primaryBg;
  return (
    <div style={{ height: 6, borderRadius: 999, background: bg, overflow: 'hidden' }}>
      <div style={{ height: '100%', width: `${Math.min(100, frac * 100)}%`, background: c, borderRadius: 999, transition: 'width .5s linear' }} />
    </div>
  );
}

        );
      })}
    </div>

// time since LTSW → auto window classification
function computeWindow(totalMin) {
  if (totalMin == null) return null;
  if (totalMin <= 270) return { key: 'tpaWin', tone: 'ok' };       // 4.5h IV thrombolysis
  if (totalMin <= 360) return { key: 'evtWin', tone: 'ok' };       // 6h standard EVT
  if (totalMin <= 1440) return { key: 'evtWin', tone: 'warn' };    // up to 24h selected EVT
  return { key: 'windowClosed', tone: 'danger' };
}

function TimeSinceField({ hours, mins, onChange }) {
  const { t } = useT();
  const total = hours == null && mins == null ? null : (hours || 0) * 60 + (mins || 0);
  const win = computeWindow(total);
  const toneMap = { ok: [ENS.okFg, ENS.okBg], warn: [ENS.warnFg, ENS.warnBg], danger: [ENS.dangFg, ENS.dangBg] };
  const Step = ({ val, unit, set }) => (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between', border: `1px solid ${ENS.line}`, borderRadius: 12, padding: '6px 8px', background: ENS.surface }}>
      <button className="ens-press" onClick={() => set(Math.max(0, (val || 0) - 1))} style={{ width: 34, height: 34, borderRadius: 9, border: 'none', background: ENS.bgSunken, cursor: 'pointer', fontSize: 20, color: ENS.ink2, lineHeight: 1 }}>−</button>
      <span style={{ display: 'flex', alignItems: 'baseline', gap: 3 }}>
        <span style={{ fontFamily: ENS.mono, fontSize: 19, fontWeight: 600, color: ENS.ink }}>{val == null ? '0' : val}</span>
        <span style={{ fontSize: 11, color: ENS.ink3 }}>{unit}</span>
      </span>
      <button className="ens-press" onClick={() => set((val || 0) + 1)} style={{ width: 34, height: 34, borderRadius: 9, border: 'none', background: ENS.bgSunken, cursor: 'pointer', fontSize: 20, color: ENS.ink2, lineHeight: 1 }}>+</button>
    </div>
  );
  return (
    <div>
      <div style={{ display: 'flex', gap: 9 }}>
        <Step val={hours} unit={t('hr')} set={(x) => onChange(x, mins)} />
        <Step val={mins} unit={t('min')} set={(x) => onChange(hours, x)} />
      </div>
      {win && (
        <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', borderRadius: 10, background: toneMap[win.tone][1] }}>
          {I.clock(toneMap[win.tone][0], 14)}
          <span style={{ fontSize: 12.5, fontWeight: 600, color: toneMap[win.tone][0] }}>
            {win.key === 'windowClosed' ? t('windowClosed') : `${t('within')} ${t(win.key)} ${t('window')}`}
          </span>
        </div>
      )}
    </div>
  );
}

// bottom sheet
function Sheet({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: 'absolute', inset: 0, zIndex: 40, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>

        {title && <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 12, paddingLeft: 4 }}>{title}</div>}
        {children}
      </div>
    </div>
  );
}

// ensapp-proto-ui2.jsx — richer controls: RadioCards, CheckGrid, CheckRow, DateTime calendar
const { useState: useState2, useEffect: useEffect2 } = React;

function humanAgo(ms, t) {
  const m = Math.max(0, Math.round(ms / 60000));
  const h = Math.floor(m / 60), mm = m % 60;
  return h > 0 ? `${h}${t('hr')} ${mm}${t('min')}` : `${mm}${t('min')}`;
}
function fmtDateTime(ts) {
  const d = new Date(ts);
  const mo = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][d.getMonth()];
  const today = new Date(); const isToday = d.toDateString() === today.toDateString();
  const hh = String(d.getHours()).padStart(2, '0'), mn = String(d.getMinutes()).padStart(2, '0');
  return `${isToday ? 'Today' : `${mo} ${d.getDate()}`} · ${hh}:${mn}`;
}
function windowFromDate(ts) { return ts ? computeWindow(Math.round((Date.now() - ts) / 60000)) : null; }

// Big radio cards (Yes/No, stroke type, candidacy)
function RadioCards({ options, value, onChange, cols = 2, green }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols},1fr)`, gap: 9 }}>
      {options.map((o) => {

        const ac = g ? ENS.okFg : ENS.primary, bg = g ? ENS.okBg : ENS.primaryBg, fg = g ? ENS.okFg : ENS.primaryDk;
        return (
          <button key={o.v} className="ens-press" onClick={() => onChange(o.v)} style={{ textAlign: 'left', cursor: 'pointer', border: on ? `1.5px solid ${ac}` : `1px solid ${ENS.line}`, background: on ? bg : ENS.surface, borderRadius: 13, padding: '13px 14px', display: 'flex', alignItems: 'center', gap: 11, transition: 'all .15s' }}>
            <span style={{ width: 20, height: 20, borderRadius: 999, border: on ? `6px solid ${ac}` : `2px solid ${ENS.line}`, background: ENS.surface, flexShrink: 0, transition: 'all .15s', boxSizing: 'border-box' }} />
            <span style={{ minWidth: 0 }}>
              <span style={{ display: 'block', fontSize: 14.5, fontWeight: 600, color: on ? fg : ENS.ink, letterSpacing: -0.2 }}>{o.l}</span>
              {o.sub && <span style={{ display: 'block', fontSize: 11.5, color: ENS.ink3, marginTop: 1 }}>{o.sub}</span>}
            </span>
          </button>

}

        {I.clock(ENS.ink3, 18)}
        <span style={{ flex: 1, textAlign: 'left', fontSize: 15, fontWeight: value ? 600 : 400, color: value ? ENS.ink : ENS.ink3 }}>{value ? fmtDateTime(value) : t('selectDateTime')}</span>
        {value && <span style={{ fontFamily: ENS.mono, fontSize: 12, color: ENS.ink3 }}>{humanAgo(Date.now() - value, t)}</span>}
      </button>
      {win && (
        <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', borderRadius: 10, background: toneMap[win.tone][1] }}>
          {I.clock(toneMap[win.tone][0], 14)}
          <span style={{ fontSize: 12.5, fontWeight: 600, color: toneMap[win.tone][0] }}>{win.key === 'windowClosed' ? t('windowClosed') : `${t('within')} ${t(win.key)} ${t('window')}`}</span>
        </div>
      )}
      <CalendarSheet open={open} onClose={() => setOpen(false)} value={value} onSet={(d) => { onChange(d); setOpen(false); }} />
    </div>
  );
}

function CalendarSheet({ open, onClose, value, onSet }) {
  const { t } = useT();
  const [view, setView] = useState2(new Date());
  const [sel, setSel] = useState2(new Date());
  useEffect2(() => {
    if (open) {
      const d = value ? new Date(value) : new Date(Date.now() - 2 * 3600000);
      setSel(new Date(d)); setView(new Date(d.getFullYear(), d.getMonth(), 1));
    }
  }, [open]);
  if (!open) return null;

  const y = view.getFullYear(), m = view.getMonth();
  const startDow = (new Date(y, m, 1).getDay() + 6) % 7; // Mon=0
  const dim = new Date(y, m + 1, 0).getDate();
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  const monName = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][m];

  const pickDay = (d) => { const n = new Date(sel); n.setFullYear(y, m, d); setSel(new Date(n)); };
  const setHM = (h, mn) => { const n = new Date(sel); if (h != null) n.setHours(h); if (mn != null) n.setMinutes(mn); setSel(new Date(n)); };
  const preset = (hrsAgo) => { setSel(new Date(Date.now() - hrsAgo * 3600000)); };
  const navM = (delta) => setView(new Date(y, m + delta, 1));

  const navBtn = (txt, fn) => <button className="ens-press" onClick={fn} style={{ width: 34, height: 34, borderRadius: 9, border: 'none', background: ENS.bgSunken, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{txt}</button>;

  return (
    <Sheet open={open} onClose={onClose} title={t('lastSeenWell')}>
      {/* quick presets */}
      <div style={{ display: 'flex', gap: 7, marginBottom: 14 }}>
        {[['nowL', 0], ['−1 h', 1], ['−3 h', 3], ['−6 h', 6]].map(([lab, h]) => (
          <button key={lab} className="ens-press" onClick={() => preset(h)} style={{ flex: 1, border: `1px solid ${ENS.line}`, background: ENS.surface, borderRadius: 10, padding: '9px 4px', cursor: 'pointer', fontSize: 12.5, fontWeight: 600, color: ENS.ink2, fontFamily: ENS.sans }}>{lab === 'nowL' ? t('nowL') : lab}</button>
        ))}
      </div>
      {/* month nav */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        {navBtn(<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke={ENS.ink2} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>, () => navM(-1))}
        <span style={{ fontSize: 15, fontWeight: 600, fontFamily: ENS.sans }}>{monName} {y}</span>
        {navBtn(<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke={ENS.ink2} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>, () => navM(1))}
      </div>
      {/* weekday labels */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2, marginBottom: 4 }}>
        {['M', 'T', 'W', 'T', 'F', 'S', 'S'].map((d, i) => <div key={i} style={{ textAlign: 'center', fontSize: 11, fontWeight: 600, color: ENS.ink3 }}>{d}</div>)}
      </div>
      {/* days */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2 }}>
        {cells.map((d, i) => {
          if (d == null) return <div key={i} />;
          const date = new Date(y, m, d);
          const future = date > today;
          const on = sel.getFullYear() === y && sel.getMonth() === m && sel.getDate() === d;
          const isToday = date.getTime() === today.getTime();
          return (
            <button key={i} disabled={future} onClick={() => pickDay(d)} style={{ height: 38, border: 'none', borderRadius: 10, cursor: future ? 'default' : 'pointer', background: on ? ENS.primary : 'transparent', color: future ? ENS.line : on ? '#fff' : ENS.ink, fontFamily: ENS.mono, fontSize: 13.5, fontWeight: on || isToday ? 700 : 500, position: 'relative' }}>
              {d}
              {isToday && !on && <span style={{ position: 'absolute', bottom: 5, left: '50%', transform: 'translateX(-50%)', width: 4, height: 4, borderRadius: 999, background: ENS.primary }} />}
            </button>
          );
        })}
      </div>
      {/* time */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginTop: 16 }}>
        {[['h', sel.getHours(), 23, (v) => setHM((v + 24) % 24, null)], ['m', sel.getMinutes(), 59, (v) => setHM(null, (v + 60) % 60)]].map(([unit, val, max, set], i) => (
          <div key={unit} style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between', border: `1px solid ${ENS.line}`, borderRadius: 12, padding: '6px 8px' }}>
            <button className="ens-press" onClick={() => set(val - (unit === 'm' ? 5 : 1))} style={{ width: 32, height: 32, borderRadius: 8, border: 'none', background: ENS.bgSunken, cursor: 'pointer', fontSize: 19, color: ENS.ink2, lineHeight: 1 }}>−</button>
            <span style={{ fontFamily: ENS.mono, fontSize: 18, fontWeight: 600 }}>{String(val).padStart(2, '0')}<span style={{ fontSize: 11, color: ENS.ink3 }}>{unit}</span></span>
            <button className="ens-press" onClick={() => set(val + (unit === 'm' ? 5 : 1))} style={{ width: 32, height: 32, borderRadius: 8, border: 'none', background: ENS.bgSunken, cursor: 'pointer', fontSize: 19, color: ENS.ink2, lineHeight: 1 }}>+</button>
          </div>
        ))}
      </div>
      <button className="ens-press" onClick={() => onSet(sel.getTime())} style={{ width: '100%', marginTop: 16, border: 'none', borderRadius: 13, padding: '15px', cursor: 'pointer', background: ENS.primary, color: '#fff', fontFamily: ENS.sans, fontSize: 15, fontWeight: 600 }}>{t('setTime')} · {fmtDateTime(sel.getTime())}</button>
    </Sheet>
  );
}

function SelectedChips({ sel, onTap }) {

function VesselPicker({ value = [], onChange }) {

// ensapp-hemo-final.jsx — chosen hemorrhagic design: A layout + B radial dial,
// live ICH score, volume can be left "not available".
// Exposes: HemoParams({ patient, set })  +  hIchScore
const HCAUSE = [{ v: 'none', l: 'cNone' }, { v: 'trauma', l: 'cTrauma' }, { v: 'avm', l: 'cAvm' }, { v: 'aneurysm', l: 'cAneurysm' }, { v: 'tumor', l: 'cTumor' }, { v: 'other', l: 'cOther' }];
const HANTICO = [{ v: 'none', l: 'cNone' }, { v: 'warfarin', l: 'aWarfarin' }, { v: 'hep', l: 'aHep' }, { v: 'doac', l: 'aDoac' }];

function hIchScore(p) {
  // returns { base, maxBonus } — base assumes unknown volume = 0 contribution
  let base = 0;
  const gcs = p.gcs == null ? 15 : p.gcs;
  if (gcs <= 4) base += 2; else if (gcs <= 12) base += 1;
  if (p.ivh) base += 1;
  if ((Number(p.age) || 0) >= 80) base += 1;
  const volKnown = !p.volUnknown && p.ich != null;
  if (volKnown && p.ich >= 30) base += 1;
  const maxBonus = volKnown ? 0 : 1; // unknown volume could add +1
  return { base, maxBonus, volKnown };
}

function HIchCard({ patient }) {
  const { t } = useT();
  const { base, maxBonus, volKnown } = hIchScore(patient);
  const mort = ['0%', '13%', '26%', '72%', '97%', '100%', '100%'];
  const tone = base <= 1 ? ENS.okFg : base <= 2 ? ENS.warnFg : ENS.dangFg;
  return (
    <div style={{ borderRadius: 18, padding: 16, background: ENS.surface, boxShadow: softShadow, border: `1px solid ${tone}33`, display: 'flex', alignItems: 'center', gap: 14 }}>
      <div style={{ width: 56, height: 56, borderRadius: 15, background: tone, color: '#fff', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <span style={{ fontFamily: ENS.mono, fontSize: 22, fontWeight: 700, lineHeight: 1 }}>{maxBonus ? `${base}–${base + maxBonus}` : base}</span>
        <span style={{ fontSize: 8, opacity: .85 }}>/ 6</span>
      </div>
      <div>
        <div style={{ fontSize: 14.5, fontWeight: 700, color: tone }}>{t('ichScore')} {maxBonus ? `${base}–${base + maxBonus}` : base}</div>
        <div style={{ fontSize: 12, color: ENS.ink2, marginTop: 2 }}>
          {volKnown
            ? <>{t('mortality30')} {mort[base]} · {t('live')}</>
            : <>{t('volPendingScore')}</>}
        </div>
      </div>
    </div>
  );
}

// radial volume dial (from B) with a "not available" state
function HVolDial({ value, unknown, onChange, onUnknown }) {
  const { t } = useT();
  const v = value == null ? 0 : value, max = 120;
  const r = 44, c = 2 * Math.PI * r, frac = unknown ? 0 : Math.min(1, v / max);
  const high = !unknown && v >= 30;
  const col = unknown ? ENS.line : high ? ENS.warnFg : ENS.primary;
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
        <span style={{ fontSize: 13.5, fontWeight: 600, color: ENS.ink2 }}>{t('hemVolume')}</span>
        <button className="ens-press" onClick={() => onUnknown(!unknown)} style={{ cursor: 'pointer', border: unknown ? `1.5px solid ${ENS.primary}` : `1px solid ${ENS.line}`, background: unknown ? ENS.primaryBg : ENS.surface, color: unknown ? ENS.primaryDk : ENS.ink3, borderRadius: 999, padding: '5px 11px', fontSize: 11.5, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 5 }}>
          <span style={{ width: 14, height: 14, borderRadius: 4, border: unknown ? 'none' : `2px solid ${ENS.line}`, background: unknown ? ENS.primary : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{unknown && <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4 10-10" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" /></svg>}</span>
          {t('notAvailable')}
        </button>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 18, opacity: unknown ? 0.55 : 1, transition: 'opacity .2s' }}>
        <div style={{ position: 'relative', width: 116, height: 116, flexShrink: 0 }}>
          <svg width="116" height="116"><circle cx="58" cy="58" r={r} fill="none" stroke={ENS.lineSoft} strokeWidth="10" /><circle cx="58" cy="58" r={r} fill="none" stroke={col} strokeWidth="10" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - frac)} transform="rotate(-90 58 58)" style={{ transition: 'stroke-dashoffset .2s, stroke .2s' }} /></svg>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ fontFamily: ENS.mono, fontSize: 23, fontWeight: 700, color: unknown ? ENS.ink3 : high ? ENS.warnFg : ENS.ink }}>{unknown ? '—' : v}</span>
            <span style={{ fontSize: 10.5, color: ENS.ink3 }}>mL</span>
          </div>
        </div>
        <div style={{ flex: 1 }}>
          <input className="ens-range" type="range" min="0" max={max} value={v} disabled={unknown} onChange={(e) => onChange(Number(e.target.value))} style={{ opacity: unknown ? 0.5 : 1 }} />
          <div style={{ marginTop: 10, fontSize: 12.5, color: high ? ENS.warnFg : ENS.ink3, fontWeight: high ? 600 : 400 }}>{unknown ? t('volPending') : high ? t('largeHematoma') : t('dragVolume')}</div>
        </div>
      </div>
    </div>
  );
}

function HGcs({ value, onChange }) {
  const { t } = useT();
  const v = value == null ? 15 : value; const tone = v <= 8 ? ENS.dangFg : v <= 12 ? ENS.warnFg : ENS.okFg; const lab = v <= 8 ? t('sevSevere') : v <= 12 ? t('sevModerate') : t('sevMild');
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 10 }}>
        <span style={{ fontFamily: ENS.mono, fontSize: 30, fontWeight: 600, color: value == null ? ENS.ink3 : tone }}>{value == null ? '—' : v}<span style={{ fontSize: 14, color: ENS.ink3 }}>/15</span></span>
        <span style={{ fontSize: 12, fontWeight: 600, color: tone, background: tone + '1A', padding: '4px 10px', borderRadius: 999 }}>{lab}</span>
      </div>
      <input className="ens-range" type="range" min="3" max="15" value={v} onChange={(e) => onChange(Number(e.target.value))} />
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6, fontFamily: ENS.mono, fontSize: 10.5, color: ENS.ink3 }}><span>3</span><span>9</span><span>15</span></div>
    </div>
  );
}

const HHead = ({ children }) => <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: -0.2 }}>{children}</div>;
const HDiv = () => <div style={{ borderTop: `1px solid ${ENS.lineSoft}` }} />;

function HemoParams({ patient, set }) {
  const { t } = useT();
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }} className="ens-screen-in">
      <div style={{ position: 'sticky', top: -6, zIndex: 3, paddingTop: 6, marginTop: -6, background: ENS.bg }}>
        <HIchCard patient={patient} />
      </div>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <HHead>{t('severity')}</HHead>
        <HVolDial value={patient.ich} unknown={!!patient.volUnknown} onChange={(v) => set({ ich: v, volUnknown: false })} onUnknown={(u) => set({ volUnknown: u })} />
        <Field label={t('gcs')} hint="3–15"><HGcs value={patient.gcs} onChange={(v) => set({ gcs: v })} /></Field>
      </Card>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <HHead>{t('patternCause')}</HHead>
        <ToggleRow title={t('isolatedIvh')} sub={t('isolatedIvhSub')} on={!!patient.ivh} onChange={(v) => set({ ivh: v })} />
        <HDiv />
        <Field label={t('secondaryCause')}><RadioCards cols={2} options={HCAUSE.map((o) => ({ v: o.v, l: t(o.l) }))} value={patient.cause || 'none'} onChange={(v) => set({ cause: v })} /></Field>
      </Card>
      <Card style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <HHead>{t('eligFactors')}</HHead>
        <ToggleRow title={t('txaExclL')} on={!!patient.txaExcl} onChange={(v) => set({ txaExcl: v })} />
        <HDiv />
        <Field label={t('anticoag')}><RadioCards cols={2} options={HANTICO.map((o) => ({ v: o.v, l: t(o.l) }))} value={patient.anti || 'none'} onChange={(v) => set({ anti: v })} /></Field>
      </Card>
    </div>
  );
}

Object.assign(window, { HemoParams, hIchScore });

// Relies on CATALOG (ensapp-catalog), ENS/useT/I (shared), MinShell/softShadow (home-min)

const PATIENTS = [
  { id: '2025-00318', date: 'May 28', age: 71, type: 'isch', nihss: 14, reviewed: false, enrolled: ['WeTrust'], eligible: ['WeTrust', 'ATHENA', 'PIVOTAL'] },
  { id: '2025-00316', date: 'May 28', age: 66, type: 'isch', nihss: 4,  reviewed: true,  enrolled: ['MOSTE'], eligible: ['MOSTE'] },
  { id: '2025-00311', date: 'May 27', age: 58, type: 'hemo', nihss: 22, reviewed: false, enrolled: [], eligible: ['STITCH'] },
  { id: '2025-00309', date: 'May 27', age: 74, type: 'isch', nihss: 9,  reviewed: false, enrolled: ['PROMISE'], eligible: ['PROMISE', 'PIVOTAL'] },
  { id: '2025-00305', date: 'May 26', age: 63, type: 'isch', nihss: 18, reviewed: true,  enrolled: ['WeTrust', 'ATHENA'], eligible: ['WeTrust', 'ATHENA'] },
  { id: '2025-00302', date: 'May 26', age: 80, type: 'isch', nihss: 6,  reviewed: false, enrolled: [], eligible: ['PIVOTAL'] },
  { id: '2025-00298', date: 'May 25', age: 69, type: 'hemo', nihss: 12, reviewed: true,  enrolled: ['STITCH'], eligible: ['STITCH'] },
  { id: '2025-00295', date: 'May 25', age: 55, type: 'isch', nihss: 3,  reviewed: true,  enrolled: ['MOSTE'], eligible: ['MOSTE'] },
];
const missedOf = (p) => p.eligible.filter((x) => !p.enrolled.includes(x));
const pcc = () => ({ isch: [ENS.isch, ENS.ischBg], hemo: [ENS.hemo, ENS.hemoBg], post: [ENS.post, ENS.postBg] });
const trMeta = (id) => CATALOG.find((x) => x.id === id) || { id, cat: 'isch', label: '' };

function computeStats() {
  const screened = PATIENTS.length;
  const enrolledP = PATIENTS.filter((p) => p.enrolled.length > 0).length;
  const missedP = PATIENTS.filter((p) => missedOf(p).length > 0).length;
  const missedTotal = PATIENTS.reduce((a, p) => a + missedOf(p).length, 0);
  const perTrial = {};
  CATALOG.forEach((tr) => { perTrial[tr.id] = { id: tr.id, cat: tr.cat, enrolled: 0, missed: 0 }; });
  PATIENTS.forEach((p) => {
    p.enrolled.forEach((id) => { if (perTrial[id]) perTrial[id].enrolled++; });
    missedOf(p).forEach((id) => { if (perTrial[id]) perTrial[id].missed++; });
  });
  const bars = Object.values(perTrial).filter((b) => b.enrolled + b.missed > 0).sort((a, b) => (b.enrolled + b.missed) - (a.enrolled + a.missed));
  return { screened, enrolledP, missedP, missedTotal, rate: Math.round((enrolledP / screened) * 100), bars };
}

}

                    <span style={{ flex: 1 }}><span style={{ fontSize: 15, fontWeight: 700 }}>{m.id}</span><span style={{ display: 'block', fontSize: 12, color: ENS.ink3, marginTop: 1 }}>{m.label}</span></span>

                      <span style={{ flex: 1 }}><span style={{ fontSize: 15, fontWeight: 700, color: '#7a4d09' }}>{m.id}</span><span style={{ display: 'block', fontSize: 12, color: ENS.warnFg, marginTop: 1 }}>{m.label}{m.status === 'paused' ? ' · paused' : ''}</span></span>

          {reviewed && <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4 10-10" stroke={ENS.okFg} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round" /></svg>}
          {reviewed ? t('reviewedDone') : t('markReviewed')}
        </button>
      </div>
    </MinShell>
  );
}

function winMin(p) { return p.ltsw ? Math.round((Date.now() - p.ltsw) / 60000) : 99999; }
function wakeOK6(p) { // wake-up: symptoms within 6h of awakening (proxy: window <= 6h+buffer)

}

// ── eligibility engine (final) ─────────────────────────────────
function evalTrials(p) {
  const w = winMin(p); const n = Number(p.nihss) || 0;
  const evt = p.evtCandidate === 'yes';
  const bigVessel = (p.vessels || []).some((v) => LARGE_VESSEL.includes(v));
  const isch = p.strokeType === 'isch', hemo = p.strokeType === 'hemo';
  const out = [];
  for (const tr of TRIALS) {
    let elig = false, reason = '';
    if (tr.id === 'WeTrust') { elig = isch && n >= 10 && (w <= 360 || wakeOK6(p)); reason = !isch ? 'Not ischemic' : n < 10 ? 'NIHSS < 10' : 'Outside 6 h window'; }
    else if (tr.id === 'MOSTE') { elig = isch && evt && n <= 5 && w <= 1380; reason = !evt ? 'Not EVT candidate' : n > 5 ? 'NIHSS > 5' : 'Outside 23 h'; }
    else if (tr.id === 'ATHENA') { elig = isch && evt && n >= 8 && w <= 1440 && bigVessel; reason = !evt ? 'Not EVT candidate' : !bigVessel ? 'No large-vessel target' : n < 8 ? 'NIHSS < 8' : 'Outside 24 h'; }
    else if (tr.id === 'PIVOTAL') { elig = isch && evt && n >= 6 && w <= 480 && bigVessel; reason = !evt ? 'Not EVT candidate' : !bigVessel ? 'No large-vessel target' : 'Outside 8 h / NIHSS < 6'; }
    else if (tr.id === 'PROMISE') { elig = isch && (p.mrs != null && p.mrs <= 2); reason = !isch ? 'Not ischemic' : 'Pre-mRS > 2'; }
    else if (tr.id === 'STITCH') { elig = hemo; reason = 'Ischemic stroke'; }
    out.push({ ...tr, elig, reason });
  }
  return out.sort((a, b) => (b.elig - a.elig));
}

// Choice overlay — entrance animation chosen by `variant`
function ChoiceOverlay({ variant, origin, onPick, onClose, animKey }) {
  const cls = (TRANSITIONS.find((x) => x.key === variant) || TRANSITIONS[0]).cls;
  const style = origin ? { '--ox': origin.x + 'px', '--oy': origin.y + 'px' } : {};
  return (
    <div key={animKey} className={`ens-choice ${cls}`} style={{ position: 'absolute', inset: 0, zIndex: 5, background: ENS.bg, overflow: 'hidden', ...style }}>
      <div style={{ paddingTop: 54, paddingLeft: 16, paddingRight: 16, paddingBottom: 4, display: 'flex', justifyContent: 'flex-end' }}>
        <button className="ens-press" onClick={onClose} style={{ width: 38, height: 38, borderRadius: 999, border: 'none', background: ENS.surface, boxShadow: softShadow, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke={ENS.ink2} strokeWidth="2" strokeLinecap="round" /></svg>
        </button>
      </div>
      <ChoiceContent onPick={onPick} stagger />
    </div>
  );
}

function App() {
  const [lang, setLang] = useState('en');
  const [screen, setScreen] = useState('home');
  const [patient, setPatient] = useState({});
  const [trial, setTrial] = useState(null);
  const [picked, setPicked] = useState([]);
  const [flow, setFlow] = useState('check');
  const [trialId, setTrialId] = useState(null);
  const [reviewId, setReviewId] = useState(null);
  const navTab = (k) => { if (k === 'home') goHome(); else if (k === 'new') openChoice(); else if (k === 'trials') setScreen('catalog'); };
  const [variant, setVariant] = useState('zoom');
  const [origin, setOrigin] = useState(null);
  const [animKey, setAnimKey] = useState(0);
  const [scale, setScale] = useState(1);
  const scalerRef = useRef(null);

  const set = (patch) => setPatient((p) => ({ ...p, ...patch }));

  useEffect(() => {
    const fit = () => {
      const vh = window.innerHeight, vw = window.innerWidth;
      setScale(Math.min(1.05, (vh - 150) / 844, (vw - 40) / 390));
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  const openChoice = useCallback(() => {
    // compute hero center in phone-logical coords for reveal/zoom origins
    const hero = document.getElementById('ens-hero');
    const sc = scalerRef.current;
    if (hero && sc) {
      const hr = hero.getBoundingClientRect();
      const sr = sc.getBoundingClientRect();
      const k = sr.width / 390;
      setOrigin({ x: (hr.left + hr.width / 2 - sr.left) / k, y: (hr.top + hr.height / 2 - sr.top) / k });
    } else setOrigin({ x: 195, y: 320 });
    setAnimKey((n) => n + 1);
    setScreen('choice');
  }, []);

  const replay = () => { if (screen === 'home') openChoice(); else { setScreen('home'); setTimeout(openChoice, 60); } };

  const goHome = () => { setScreen('home'); setPatient({}); setTrial(null); setPicked([]); setFlow('check'); };
  const enroll = (id) => { setTrial([id]); setScreen('confirm'); };   // quick flow: single
  const togglePick = (id) => setPicked((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);
  const confirmMulti = () => { setTrial(picked); setScreen('send'); };

  const base = screen === 'choice' ? 'home' : screen;
  let view = null;
  if (base === 'home') view = <HomeFinal onNew={openChoice} onCatalog={() => setScreen('catalog')} onPast={() => setScreen('past')} onNav={navTab} />;
  else if (base === 'catalog') view = <TrialCatalog onOpen={(id) => { setTrialId(id); setScreen('trialDetail'); }} onNav={navTab} />;
  else if (base === 'trialDetail') view = <TrialDetail trial={trialId} onBack={() => setScreen('catalog')} onNav={navTab} />;
  else if (base === 'past') view = <PastPatients onOpen={(id) => { setReviewId(id); setScreen('patientReview'); }} onNav={navTab} />;
  else if (base === 'patientReview') view = <PatientReview id={reviewId} onBack={() => setScreen('past')} onNav={navTab} />;
  else if (base === 'pre') view = <StepPreImaging patient={patient} set={set} onBack={() => setScreen('home')} onNext={() => setScreen('preResult')} />;
  else if (base === 'preResult') view = <PreImagingResult patient={patient} onBack={() => setScreen('pre')} onNext={() => setScreen('post')} />;
  else if (base === 'post') view = <StepPostImaging patient={patient} set={set} onBack={() => setScreen('preResult')} onNext={() => setScreen('results')} />;
  else if (base === 'results') view = <ResultsScreen patient={patient} selected={picked} onToggle={togglePick} onBack={() => setScreen('post')} onHome={goHome} onReview={() => setScreen('summary')} />;
  else if (base === 'summary') view = <EnrollSummary patient={patient} selected={picked} onBack={() => setScreen(flow === 'direct' ? 'quick' : 'results')} onConfirm={confirmMulti} />;
  else if (base === 'send') view = <SendRecord patient={patient} trials={trial} onBack={() => setScreen('summary')} onSent={() => setScreen('confirm')} />;
  else if (base === 'quick') view = <QuickPatient patient={patient} set={set} selected={picked} onToggle={togglePick} onBack={() => setScreen('home')} onReview={() => setScreen('summary')} />;
  else if (base === 'confirm') view = <EnrollConfirm patient={patient} trials={trial} onHome={goHome} />;

  const pickFromChoice = (k) => { setFlow(k === 'check' ? 'check' : 'direct'); setScreen(k === 'check' ? 'pre' : 'quick'); };

  return (
    <LangCtx.Provider value={{ lang, setLang }}>
      <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 18, padding: '20px 0 24px', background: 'radial-gradient(120% 120% at 50% 0%, #fbfbfc 0%, #eceef2 100%)' }}>
        {/* phone */}
        <div style={{ width: 390 * scale, height: 844 * scale, flexShrink: 0 }}>
          <div ref={scalerRef} style={{ width: 390, height: 844, transform: `scale(${scale})`, transformOrigin: 'top left' }}>
            <IOSDevice width={390} height={844}>
              <div style={{ position: 'relative', height: '100%' }}>
                <div key={base} className={base === 'home' || base === 'confirm' ? '' : 'ens-screen-in'} style={{ height: '100%' }}>{view}</div>
                {screen === 'choice' && <ChoiceOverlay variant={variant} origin={origin} animKey={animKey} onPick={pickFromChoice} onClose={() => setScreen('home')} />}
              </div>
            </IOSDevice>
          </div>
        </div>

        {/* transition picker (outside the phone) */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: '#fff', borderRadius: 16, padding: '10px 12px', boxShadow: '0 2px 10px rgba(16,24,40,.08), 0 0 0 1px rgba(16,24,40,.04)', fontFamily: ENS.sans }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: ENS.ink3, textTransform: 'uppercase', letterSpacing: 0.5, paddingLeft: 4 }}>Transition</span>
          <div style={{ display: 'flex', gap: 4, background: ENS.bgSunken, borderRadius: 10, padding: 3 }}>
            {TRANSITIONS.map((tr) => {
              const on = variant === tr.key;
              return <button key={tr.key} onClick={() => setVariant(tr.key)} style={{ border: 'none', cursor: 'pointer', borderRadius: 8, padding: '7px 12px', fontSize: 13, fontWeight: 600, fontFamily: ENS.sans, color: on ? '#fff' : ENS.ink2, background: on ? ENS.ink : 'transparent', transition: 'all .15s' }}>{tr.label}</button>;
            })}
          </div>
          <button className="ens-press" onClick={replay} style={{ border: 'none', cursor: 'pointer', borderRadius: 10, padding: '8px 14px', fontSize: 13, fontWeight: 700, fontFamily: ENS.sans, color: '#fff', background: ENS.primary, display: 'flex', alignItems: 'center', gap: 6 }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M6 4l14 8-14 8z" /></svg> Play
          </button>
          <button onClick={() => setLang(lang === 'en' ? 'es' : 'en')} style={{ border: `1px solid ${ENS.line}`, background: '#fff', cursor: 'pointer', borderRadius: 10, padding: '8px 10px', fontSize: 12, fontWeight: 600, fontFamily: ENS.mono, color: ENS.ink2 }}>{lang.toUpperCase()}</button>
        </div>
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
