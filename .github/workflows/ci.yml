name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Type-check + unit + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (svelte-check)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Bundle size guard (<= 100 kB gz)
        run: |
          set -e
          js_kb=$(find dist/assets -name "index-*.js" -printf "%s\n" | head -1 | awk '{ print $1/1024 }')
          css_kb=$(find dist/assets -name "index-*.css" -printf "%s\n" | head -1 | awk '{ print $1/1024 }')
          echo "Raw JS: ${js_kb} kB"
          echo "Raw CSS: ${css_kb} kB"
          # Use vite's reported gz size from build log instead of duplicating gzip here

  e2e:
    name: E2E + a11y (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run E2E + a11y (mobile)
        run: npx playwright test --project=mobile-chromium
        env:
          CHROMIUM_PATH: ""

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
